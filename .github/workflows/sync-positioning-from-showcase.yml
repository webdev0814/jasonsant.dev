name: Sync Positioning Links From GitHub Showcase

on:
  workflow_dispatch:
  schedule:
    - cron: "19 */6 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-positioning-from-showcase.yml"
      - "scripts/sync_positioning_projects.py"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync highlighted GitHub work
        run: python scripts/sync_positioning_projects.py

      - name: Commit updated positioning links
        run: |
          if git diff --quiet -- index.html; then
            echo "No positioning updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Sync positioning links from GitHub showcase"
          git push
